<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <!-- Background -->
  <rect width="300" height="400" fill="#1a1a2e"/>
  <!-- Subtle ground/grass hint -->
  <rect x="0" y="340" width="300" height="60" fill="#0d2b0d" opacity="0.6"/>

  <!-- Club shaft (extends from hand down) -->
  <line x1="195" y1="200" x2="230" y2="360" stroke="#c0a060" stroke-width="4" stroke-linecap="round"/>
  <!-- Club grip wrap -->
  <rect x="187" y="194" width="10" height="28" rx="5" fill="#2a2a2a"/>
  <!-- Club head -->
  <ellipse cx="234" cy="364" rx="14" ry="6" fill="#888" transform="rotate(-15 234 364)"/>

  <!-- Torso / Shirt (polo) - dark green -->
  <path d="M100 220 Q105 180 150 170 Q195 180 200 220 L205 320 Q150 330 95 320 Z" fill="#1a4a2a"/>
  <!-- Collar -->
  <path d="M135 170 Q150 185 165 170 L160 185 Q150 195 140 185 Z" fill="#0f3020"/>
  <!-- Shirt stripe accent -->
  <path d="M102 240 Q150 235 198 240 L197 250 Q150 245 103 250 Z" fill="#226633" opacity="0.7"/>

  <!-- Right arm (holding club) -->
  <path d="M193 185 Q210 200 205 230 Q200 250 193 265" stroke="#c8a882" stroke-width="22" stroke-linecap="round" fill="none"/>
  <!-- Left arm (slightly forward) -->
  <path d="M107 185 Q90 210 95 245 Q100 265 108 275" stroke="#c8a882" stroke-width="22" stroke-linecap="round" fill="none"/>

  <!-- Shirt sleeve right -->
  <path d="M193 185 Q212 198 207 228" stroke="#1a4a2a" stroke-width="18" stroke-linecap="round" fill="none"/>
  <!-- Shirt sleeve left -->
  <path d="M107 185 Q88 210 93 242" stroke="#1a4a2a" stroke-width="18" stroke-linecap="round" fill="none"/>

  <!-- Right hand on club -->
  <ellipse cx="194" cy="268" rx="13" ry="10" fill="#c8a882"/>
  <!-- Left hand below right -->
  <ellipse cx="192" cy="285" rx="13" ry="10" fill="#c8a882"/>

  <!-- Neck -->
  <rect x="138" y="148" width="24" height="28" rx="10" fill="#c8a882"/>

  <!-- Head -->
  <ellipse cx="150" cy="118" rx="38" ry="44" fill="#c8a882"/>

  <!-- Hair -->
  <path d="M112 108 Q115 70 150 72 Q185 70 188 108 Q180 85 150 83 Q120 85 112 108 Z" fill="#3a2510"/>

  <!-- Eyes -->
  <ellipse cx="136" cy="112" rx="5" ry="6" fill="white"/>
  <ellipse cx="164" cy="112" rx="5" ry="6" fill="white"/>
  <circle cx="137" cy="113" r="3" fill="#2a1a0a"/>
  <circle cx="165" cy="113" r="3" fill="#2a1a0a"/>
  <!-- Eye shine -->
  <circle cx="138" cy="111" r="1" fill="white"/>
  <circle cx="166" cy="111" r="1" fill="white"/>

  <!-- Eyebrows -->
  <path d="M130 104 Q136 100 142 103" stroke="#3a2510" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M158 103 Q164 100 170 104" stroke="#3a2510" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Nose -->
  <path d="M148 118 Q145 128 150 130 Q155 128 152 118" stroke="#b09070" stroke-width="1.5" fill="none"/>

  <!-- Mouth - slight smirk -->
  <path d="M140 138 Q150 144 160 138" stroke="#9a6050" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Golf cap -->
  <path d="M112 100 Q115 68 150 66 Q185 68 188 100 Q175 92 150 90 Q125 92 112 100 Z" fill="#1a4a2a"/>
  <!-- Cap brim -->
  <path d="M108 100 Q120 108 150 106 Q180 108 192 100 L188 96 Q175 103 150 101 Q125 103 112 96 Z" fill="#0f3020"/>
  <!-- Cap button -->
  <circle cx="150" cy="68" r="4" fill="#0f3020"/>

  <!-- Question mark on shirt -->
  <text x="150" y="285" text-anchor="middle" font-size="28" font-weight="bold" fill="rgba(255,255,255,0.15)" font-family="Georgia, serif">?</text>
</svg>